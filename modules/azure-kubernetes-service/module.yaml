changes:
  - kind: changed
    description: "BREAKING: Replaced the `kubernetes_default_node_*` variables with the `default_node_pool` object, added `node_autoscaling` to choose between Cluster Autoscaler, AKS node auto-provisioning, or fixed node pools, and removed the implicit default `stable` and `burst` user pools from `node_pool_settings`."
