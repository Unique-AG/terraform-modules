name: azure-storage-account
sources:
  - https://github.com/Unique-AG/terraform-modules/tree/main/modules/azure-storage-account
version: 6.1.0
compatibility:
  unique.ai: ~> 2025.24
changes:
  - kind: added
    description: "Variable `private_endpoints` (map keyed by subresource name, e.g. `blob`, `file`) replaces the deprecated `private_endpoint`. Each entry creates its own `azurerm_private_endpoint.storage_account_pe_map[\"<subresource>\"]` resource. The two variables are mutually exclusive; setting both is a validation error. When migrating from `private_endpoint`, add a `moved` block in your calling module from `azurerm_private_endpoint.storage_account_pe[0]` to `azurerm_private_endpoint.storage_account_pe_map[\"<subresource>\"]`."
