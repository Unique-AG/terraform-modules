name: azure-storage-account
sources:
  - https://github.com/Unique-AG/terraform-modules/tree/main/modules/azure-storage-account
version: 6.1.0
compatibility:
  unique.ai: ~> 2025.24
changes:
  - kind: added
    description: "Variable `private_endpoints` (map keyed by subresource name, e.g. `blob`, `file`) replaces the deprecated `private_endpoint`. Allows multiple private endpoints per storage account. When migrating, add a `moved` block in your calling module to re-key the existing state address from `azurerm_private_endpoint.storage_account_pe[0]` to `azurerm_private_endpoint.storage_account_pe[\"<subresource>\"]`."
